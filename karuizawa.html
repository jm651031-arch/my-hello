<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>輕井澤二日旅伴 ・ 6/18-6/19</title>
<meta name="theme-color" content="#2d4a3e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="輕井澤旅伴">
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIui8leS6leW+pOS6jOaXpeaXheS8tCIsCiAgInNob3J0X25hbWUiOiAi6Lyb5LqV5r6k5peF5LyrIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmYWY3ZjAiLAogICJ0aGVtZV9jb2xvciI6ICIjMmQ0YTNlIiwKICAibGFuZyI6ICJ6aC1UVyIKfQ==">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #2d4a3e;
    --forest-deep: #1f3a2e;
    --moss: #5a7a5e;
    --cream: #f5f1e8;
    --paper: #faf7f0;
    --wood: #8b6f47;
    --accent: #c97b4f;
    --accent-deep: #a85d33;
    --gold: #b8932f;
    --red: #c44e3a;
    --ink: #1a1a1a;
    --ink-mid: #3a3a3a;
    --shadow-sm: 0 2px 8px rgba(45, 74, 62, 0.1);
    --shadow-md: 0 4px 16px rgba(45, 74, 62, 0.15);
    --shadow-lg: 0 8px 24px rgba(45, 74, 62, 0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 20px;
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
    letter-spacing: 0.3px;
  }
  .header {
    background: linear-gradient(180deg, var(--forest-deep) 0%, var(--forest) 100%);
    color: var(--cream);
    padding: 28px 20px 24px;
    text-align: center;
  }
  .header h1 {
    font-family: "Noto Serif TC", serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  .header .dates {
    font-family: "Noto Serif TC", serif;
    font-size: 21px;
    color: #f5d8a8;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 17px;
    opacity: 0.9;
    letter-spacing: 2px;
  }
  .next-bar {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
  }
  .next-bar .icon { font-size: 24px; flex-shrink: 0; }
  .next-bar .content { flex: 1; min-width: 0; }
  .next-bar .label {
    font-size: 13px;
    opacity: 0.9;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .next-bar .info {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.4;
  }
  .next-bar .info .time {
    font-family: "Noto Serif TC", serif;
    font-size: 19px;
    margin-right: 6px;
  }
  .day-tabs {
    display: flex;
    background: var(--paper);
    padding: 14px 12px;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 40;
    box-shadow: var(--shadow-sm);
  }
  .day-tab {
    flex: 1;
    padding: 14px 10px;
    background: white;
    border: 3px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    box-shadow: var(--shadow-sm);
    min-height: 72px;
    transition: all 0.3s ease;
  }
  .day-tab.active {
    background: var(--forest);
    color: var(--cream);
    border-color: var(--accent);
  }
  .day-tab .day-num {
    font-family: "Noto Serif TC", serif;
    font-size: 13px;
    letter-spacing: 3px;
    opacity: 0.85;
  }
  .day-tab .day-name {
    font-family: "Noto Serif TC", serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 2px 0;
  }
  .day-tab .day-date {
    font-size: 14px;
    opacity: 0.85;
  }
  .timeline {
    padding: 18px 14px 100px;
    display: none;
    max-width: 600px;
    margin: 0 auto;
  }
  .timeline.active { display: block; animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  
  .tip-banner {
    background: linear-gradient(135deg, #fff8ed 0%, #f5e4c8 100%);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 18px;
    border-left: 5px solid var(--gold);
    box-shadow: var(--shadow-sm);
  }
  .tip-banner .tip-title {
    font-family: "Noto Serif TC", serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-deep);
    margin-bottom: 8px;
  }
  .tip-banner .tip-content {
    font-size: 17px;
    line-height: 1.75;
    color: var(--ink);
  }
  .tip-banner .tip-content strong { color: var(--accent-deep); font-weight: 700; }
  
  .card {
    background: white;
    border-radius: 18px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    border-left: 6px solid var(--moss);
  }
  .card-header {
    padding: 16px 20px;
    background: var(--cream);
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(45, 74, 62, 0.05);
  }
  .card-time {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--forest);
    width: 75px;
  }
  .card-title {
    font-weight: 700;
    font-size: 18px;
    color: var(--forest-deep);
    flex: 1;
  }
  .card-body {
    padding: 16px 20px;
    font-size: 16px;
    color: var(--ink-mid);
    line-height: 1.6;
  }
</style>
</head>
<body>

  <!-- 頂部區塊 -->
  <header class="header">
    <h1>輕井澤</h1>
    <div class="dates">6/18 - 6/19</div>
    <div class="subtitle">二日療癒旅伴</div>
  </header>

  <!-- 狀態列 -->
  <div class="next-bar">
    <div class="icon">🚂</div>
    <div class="content">
      <div class="label">NEXT</div>
      <div class="info"><span class="time">09:00</span> 搭乘新幹線前往輕井澤</div>
    </div>
  </div>

  <!-- 天數切換頁籤 -->
  <div class="day-tabs">
    <button class="day-tab active" onclick="switchDay(1)">
      <div class="day-num">DAY 1</div>
      <div class="day-name">初見</div>
      <div class="day-date">6/18</div>
    </button>
    <button class="day-tab" onclick="switchDay(2)">
      <div class="day-num">DAY 2</div>
      <div class="day-name">漫遊</div>
      <div class="day-date">6/19</div>
    </button>
  </div>

  <!-- Day 1 時間軸 -->
  <div id="day1" class="timeline active">
    <div class="tip-banner">
      <div class="tip-title">💡 溫馨提醒</div>
      <div class="tip-content">初夏的輕井澤早晚微涼，記得隨身帶件<strong>薄外套</strong>喔！我們準備出發了。</div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <div class="card-time">09:00</div>
        <div class="card-title">東京車站出發</div>
      </div>
      <div class="card-body">
        搭乘北陸新幹線，伴隨著鐵道的節奏，放鬆心情準備迎接充滿綠意的旅程。
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-time">10:30</div>
        <div class="card-title">抵達輕井澤站</div>
      </div>
      <div class="card-body">
        深呼吸，感受第一口森林的清新空氣。我們先去飯店寄放行李，讓雙手獲得自由吧。
      </div>
    </div>
  </div>

  <!-- Day 2 時間軸 -->
  <div id="day2" class="timeline">
    <div class="tip-banner">
      <div class="tip-title">🌿 慢活建議</div>
      <div class="tip-content">今天的主題是漫步，讓腳步慢下來，好好感受陽光穿透樹葉的溫暖。</div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <div class="card-time">09:30</div>
        <div class="card-title">森林早餐時光</div>
      </div>
      <div class="card-body">
        在澤村麵包（Sawamura）享用新鮮出爐的牛角麵包與熱咖啡，為美好的一天注入能量。
      </div>
    </div>
  </div>

  <!-- 簡單的切換腳本 -->
  <script>
    function switchDay(day) {
      document.querySelectorAll('.day-tab').forEach((tab, index) => {
        if (index + 1 === day) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });
      
      document.querySelectorAll('.timeline').forEach((timeline, index) => {
        if (index + 1 === day) {
          timeline.classList.add('active');
        } else {
          timeline.classList.remove('active');
        }
      });
    }
  </script>
</body>
</html>
