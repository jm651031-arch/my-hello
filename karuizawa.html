<style>
  :root {
    --forest: #2d4a3e;
    --forest-deep: #1f3a2e;
    --moss: #5a7a5e;
    --cream: #f5f1e8;
    --paper: #faf7f0;
    --wood: #8b6f47;
    --accent: #c97b4f;
    --accent-deep: #a85d33;
    --gold: #b8932f;
    --red: #c44e3a;
    --ink: #1a1a1a;
    --ink-mid: #3a3a3a;
    --shadow-sm: 0 2px 8px rgba(45, 74, 62, 0.1);
    --shadow-md: 0 4px 16px rgba(45, 74, 62, 0.15);
    --shadow-lg: 0 8px 24px rgba(45, 74, 62, 0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 20px;
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
    letter-spacing: 0.3px;
  }
  .header {
    background: linear-gradient(180deg, var(--forest-deep) 0%, var(--forest) 100%);
    color: var(--cream);
    padding: 28px 20px 24px;
    text-align: center;
  }
  .header h1 {
    font-family: "Noto Serif TC", serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  .header .dates {
    font-family: "Noto Serif TC", serif;
    font-size: 21px;
    color: #f5d8a8;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 17px;
    opacity: 0.9;
    letter-spacing: 2px;
  }
  .next-bar {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
  }
  .next-bar .icon { font-size: 24px; flex-shrink: 0; }
  .next-bar .content { flex: 1; min-width: 0; }
  .next-bar .label {
    font-size: 13px;
    opacity: 0.9;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .next-bar .info {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.4;
  }
  .next-bar .info .time {
    font-family: "Noto Serif TC", serif;
    font-size: 19px;
    margin-right: 6px;
  }
  .day-tabs {
    display: flex;
    background: var(--paper);
    padding: 14px 12px;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 40;
    box-shadow: var(--shadow-sm);
  }
  .day-tab {
    flex: 1;
    padding: 14px 10px;
    background: white;
    border: 3px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    box-shadow: var(--shadow-sm);
    min-height: 72px;
  }
  .day-tab.active {
    background: var(--forest);
    color: var(--cream);
    border-color: var(--accent);
  }
  .day-tab .day-num {
    font-family: "Noto Serif TC", serif;
    font-size: 13px;
    letter-spacing: 3px;
    opacity: 0.85;
  }
  .day-tab .day-name {
    font-family: "Noto Serif TC", serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 2px 0;
  }
  .day-tab .day-date {
    font-size: 14px;
    opacity: 0.85;
  }
  .timeline {
    padding: 18px 14px 100px;
    display: none;
    max-width: 600px;
    margin: 0 auto;
  }
  .timeline.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .tip-banner {
    background: linear-gradient(135deg, #fff8ed 0%, #f5e4c8 100%);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 18px;
    border-left: 5px solid var(--gold);
  }
  .tip-banner .tip-title {
    font-family: "Noto Serif TC", serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-deep);
    margin-bottom: 8px;
  }
  .tip-banner .tip-content {
    font-size: 17px;
    line-height: 1.75;
    color: var(--ink);
  }
  .tip-banner .tip-content strong { color: var(--accent-deep); font-weight: 700; }
  .card {
    background: white;
    border-radius: 18px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    border-left: 5px solid var(--moss);
    transition: opacity 0.3s, border-color 0.3s;
  }
  .card.done { opacity: 0.55; border-left-color: var(--gold); }
  .card-head {
    padding: 18px 18px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .check-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid var(--moss);
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: transparent;
    font-weight: 700;
    transition: all 0.2s;
  }
  .check-btn.checked {
    background: var(--moss);
    border-color: var(--moss);
    color: white;
  }
  .card-head-content { flex: 1; min-width: 0; }
  .card-time {
    display: inline-block;
    background: var(--forest);
    color: var(--cream);
    padding: 6px 16px;
    border-radius: 22px;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 1px;
    font-family: "Noto Serif TC", monospace;
  }
  .card-title {
    font-family: "Noto Serif TC", serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .card-subtitle {
    font-size: 17px;
    color: var(--ink-mid);
    line-height: 1.6;
  }
  .card-body { padding: 0 18px 18px; }
  .info-block {
    background: var(--cream);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 4px solid var(--accent);
  }
  .info-block.service { border-left-color: var(--wood); background: #f5ede0; }
  .info-block.recommend { border-left-color: var(--moss); background: #e8efe5; }
  .info-block .label {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    margin-right: 8px;
    letter-spacing: 2px;
    vertical-align: middle;
  }
  .info-block.service .label { background: var(--wood); }
  .info-block.recommend .label { background: var(--moss); }
  .info-block .content {
    font-size: 18px;
    color: var(--ink);
    line-height: 1.75;
    display: inline;
  }
  .info-block .content strong { color: var(--accent-deep); font-weight: 700; }
  .must-buy {
    background: linear-gradient(135deg, #fff8ed 0%, #fdebd0 100%);
    border-radius: 12px;
    padding: 16px 18px;
    margin-top: 12px;
    border: 2px dashed var(--accent);
  }
  .must-buy-title {
    font-family: "Noto Serif TC", serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-deep);
    margin-bottom: 12px;
  }
  .must-buy ul { list-style: none; }
  .must-buy li {
    font-size: 18px;
    line-height: 1.75;
    padding: 10px 0;
    border-bottom: 1px dashed rgba(168, 93, 51, 0.25);
    color: var(--ink);
  }
  .must-buy li:last-child { border-bottom: none; padding-bottom: 0; }
  .must-buy li:first-child { padding-top: 0; }
  .must-buy li strong {
    color: var(--accent-deep);
    font-weight: 700;
    font-size: 19px;
  }
  .must-buy li .detail {
    display: block;
    font-size: 16px;
    color: var(--ink-mid);
    margin-top: 4px;
    line-height: 1.6;
  }
  .must-buy li .warn { color: #b8421a; font-weight: 700; }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .action-btn {
    flex: 1;
    min-width: 110px;
    min-height: 52px;
    padding: 12px 14px;
    background: var(--forest);
    color: var(--cream);
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    letter-spacing: 1px;
    transition: transform 0.15s;
    text-decoration: none;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-btn.map { background: var(--accent); }
  .action-btn.card { background: var(--wood); }
  .action-btn.remind { background: var(--moss); }
  .action-btn .icon { font-size: 18px; }
  /* 自由筆記 */
  .note-area {
    margin-top: 14px;
    background: #fffbf2;
    border-radius: 12px;
    padding: 14px 16px;
    border: 2px dashed rgba(168, 93, 51, 0.3);
  }
  .note-area .note-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-deep);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .note-area textarea {
    width: 100%;
    min-height: 60px;

};

// 緊急聯絡資料
const EMERGENCY = [
  { icon: "🏨", name: "王子飯店西館", phone: "+81-267-42-1111" },
  { icon: "🚉", name: "輕井澤車站", phone: "+81-267-42-2400" },
  { icon: "🇹🇼", name: "台北駐日代表處", phone: "+81-3-3280-7811" },
  { icon: "🚓", name: "日本警察 (免費)", phone: "110" },
  { icon: "🚑", name: "救護車 (免費)", phone: "119" }
];

// ============================================
// 渲染行程卡片(用資料動態生成,可擴充)
// ============================================
function renderTimeline(dayKey) {
  const container = document.getElementById(dayKey);
  const items = ITINERARY[dayKey];
  if (!items) return;
  // 保留已有的 tip-banner,後面接卡片
  const existingBanner = container.querySelector(".tip-banner");
  let html = existingBanner ? existingBanner.outerHTML : "";
  items.forEach((item, idx) => {
    const cardId = `${dayKey}_${idx}`;
    html += `
      <div class="card" data-card-id="${cardId}" data-time="${item.time}" data-title="${item.title}">
        <div class="card-head">
          <button class="check-btn" data-check="${cardId}">✓</button>
          <div class="card-head-content">
            <div class="card-time">${item.time}</div>
            <div class="card-title">${item.title}</div>
            ${item.subtitle ? `<div class="card-subtitle">${item.subtitle}</div>` : ""}
          </div>
        </div>
        <div class="card-body">
    `;
    if (item.blocks) {
      item.blocks.forEach(b => {
        const cls = b.type === "service" ? "service" : b.type === "recommend" ? "recommend" : "";
        html += `
          <div class="info-block ${cls}">
            <span class="label">${b.label}</span>
            <span class="content">${b.content}</span>
          </div>
        `;
      });
    }
    if (item.mustBuy) {
      html += `<div class="must-buy"><div class="must-buy-title">${item.mustBuy.title}</div><ul>`;
      item.mustBuy.items.forEach(mb => {
        const detail = mb.detail.startsWith("warn:")
          ? `<span class="warn">${mb.detail.slice(5)}</span>`
          : mb.detail;
        html += `
          <li>
            <strong>${mb.name}</strong>${mb.desc ? ":" + mb.desc : ""}
            <span class="detail">${detail}</span>
          </li>
        `;
      });
      html += `</ul></div>`;
    }
    // 按鈕區
    const buttons = [];
    if (item.map) buttons.push(`<button class="action-btn map" onclick="openMap('${item.map}')"><span class="icon">📍</span>開地圖</button>`);
    if (item.card) buttons.push(`<button class="action-btn card" onclick="openCard('${item.card}')"><span class="icon">🗾</span>給店員看</button>`);
    if (item.remind) buttons.push(`<button class="action-btn remind" data-event="${item.title}" data-time="${item.remind}"><span class="icon">⏰</span>加入行事曆</button>`);
    if (buttons.length) html += `<div class="actions">${buttons.join("")}</div>`;
    // 自由筆記
    html += `
      <div class="note-area">
        <div class="note-label">📝 我的小筆記</div>
        <textarea data-note="${cardId}" placeholder="例:吃藥、買水、提醒自己..."></textarea>

```
    <div class="note-hint">自動儲存,只存在你的手機</div>
  </div>
`;
html += `</div></div>`;
```

});
container.innerHTML = html;
}

renderTimeline(“day1”);
renderTimeline(“day2”);

// ============================================
// 互動邏輯
// ============================================

// 分頁切換
document.querySelectorAll(”.day-tab”).forEach(tab => {
tab.addEventListener(“click”, () => {
document.querySelectorAll(”.day-tab”).forEach(t => t.classList.remove(“active”));
document.querySelectorAll(”.timeline”).forEach(t => t.classList.remove(“active”));
tab.classList.add(“active”);
document.getElementById(“day” + tab.dataset.day).classList.add(“active”);
window.scrollTo({ top: 0, behavior: “smooth” });
updateNextStop();
});
});

// 勾選 + 載入儲存狀態
document.querySelectorAll(”.check-btn”).forEach(btn => {
const id = btn.dataset.check;
try {
if (localStorage.getItem(“kz_check_” + id) === “1”) {
btn.classList.add(“checked”);
btn.closest(”.card”).classList.add(“done”);
}
} catch (e) {}
btn.addEventListener(“click”, () => {
btn.classList.toggle(“checked”);
btn.closest(”.card”).classList.toggle(“done”);
try {
localStorage.setItem(“kz_check_” + id, btn.classList.contains(“checked”) ? “1” : “0”);
} catch (e) {}
updateNextStop();
});
});

// 筆記 - 載入 + 自動儲存
document.querySelectorAll(“textarea[data-note]”).forEach(ta => {
const id = ta.dataset.note;
try { ta.value = localStorage.getItem(“kz_note_” + id) || “”; } catch (e) {}
let timer;
ta.addEventListener(“input”, () => {
clearTimeout(timer);
timer = setTimeout(() => {
try { localStorage.setItem(“kz_note_” + id, ta.value); } catch (e) {}
}, 500);
});
});

// 設提醒
document.querySelectorAll(”.action-btn.remind”).forEach(btn => {
btn.addEventListener(“click”, () => {
const event = btn.dataset.event;
const time = btn.dataset.time;
const startDate = new Date(time);
const endDate = new Date(startDate.getTime() + 30 * 60000);
const fmt = d => d.toISOString().replace(/[-:]/g, “”).replace(/.\d{3}/, “”).replace(/Z$/, “”);
const startStr = fmt(startDate);
const endStr = fmt(endDate);
const ics = `BEGIN:VCALENDAR VERSION:2.0 PRODID:-//Karuizawa Trip//ZH-TW BEGIN:VEVENT UID:${Date.now()}@karuizawa DTSTAMP:${startStr} DTSTART:${startStr} DTEND:${endStr} SUMMARY:輕井澤 ・ ${event} DESCRIPTION:輕井澤二日旅伴 自動提醒 BEGIN:VALARM TRIGGER:-PT15M ACTION:DISPLAY DESCRIPTION:即將開始 - ${event} END:VALARM END:VEVENT END:VCALENDAR`;
const blob = new Blob([ics], { type: “text/calendar;charset=utf-8” });
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url;
a.download = `karuizawa_${event}.ics`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
showToast(“✅ 已下載提醒,請點開檔案加入手機行事曆”);
});
});

// 開地圖
function openMap(query) {
window.open(“https://www.google.com/maps/search/?api=1&query=” + encodeURIComponent(query), “_blank”);
}

// 開「指著看」小卡
function openCard(key) {
const data = CARDS[key];
if (!data) return;
document.getElementById(“modalTitle”).textContent = data.title;
let html = `<div class="modal-intro">${data.intro}</div>`;
data.items.forEach(item => {
html += `<div class="point-card"> <div class="zh">${item.zh}</div> <div class="jp">${item.jp}</div> <div class="hint">${item.hint}</div> </div>`;
});
document.getElementById(“modalBody”).innerHTML = html;
document.getElementById(“modal”).classList.add(“show”);
}

// 開緊急聯絡
function openEmergency() {
document.getElementById(“modalTitle”).textContent = “📞 緊急聯絡”;
let html = `<div class="modal-intro">遇到狀況時,<strong>點電話號碼可直撥</strong>。</div>`;
EMERGENCY.forEach(e => {
const cleanPhone = e.phone.replace(/[^\d+]/g, “”);
html += `<div class="emergency-card"> <div class="emergency-icon">${e.icon}</div> <div class="emergency-info"> <div class="emergency-name">${e.name}</div> <div class="emergency-phone">${e.phone}</div> </div> <a class="call-btn" href="tel:${cleanPhone}">📞 撥打</a> </div>`;
});
html += `<div class="emergency-tip"> <strong>提醒:</strong>在日本撥打 110/119 免費, 不會說日文也可說「<strong>I need help. English please.</strong>」 或請周圍的人協助通話。 </div>`;
document.getElementById(“modalBody”).innerHTML = html;
document.getElementById(“modal”).classList.add(“show”);
}

function closeModal() {
document.getElementById(“modal”).classList.remove(“show”);
}
document.getElementById(“modal”).addEventListener(“click”, e => {
if (e.target.id === “modal”) closeModal();
});

// 回頂部
function scrollToTop() {
window.scrollTo({ top: 0, behavior: “smooth” });
}

// Toast 訊息
function showToast(msg) {
const t = document.getElementById(“toast”);
t.textContent = msg;
t.classList.add(“show”);
setTimeout(() => t.classList.remove(“show”), 3000);
}

// 「下一站」顯示 - 找出當前 active day 中,第一個未勾選的卡片
function updateNextStop() {
const activeDay = document.querySelector(”.timeline.active”);
if (!activeDay) return;
const firstUndone = activeDay.querySelector(”.card:not(.done)”);
const bar = document.getElementById(“nextBar”);
if (firstUndone) {
const time = firstUndone.dataset.time;
const title = firstUndone.dataset.title;
document.getElementById(“nextInfo”).innerHTML = `<span class="time">${time}</span>${title}`;
bar.style.display = “flex”;
} else {
document.getElementById(“nextInfo”).textContent = “🎉 今天行程全部完成!”;
bar.style.display = “flex”;
}
}
updateNextStop();

// PWA - 離線可用
// ============================================
if (“serviceWorker” in navigator) {
const swCode = `const CACHE = "karuizawa-v1"; self.addEventListener("install", e => { self.skipWaiting(); }); self.addEventListener("activate", e => { e.waitUntil(self.clients.claim()); }); self.addEventListener("fetch", e => { if (e.request.method !== "GET") return; e.respondWith( caches.match(e.request).then(cached => { const fetched = fetch(e.request).then(resp => { const copy = resp.clone(); caches.open(CACHE).then(c => c.put(e.request, copy)).catch(() => {}); return resp; }).catch(() => cached); return cached || fetched; }) ); });`;
const swBlob = new Blob([swCode], { type: “text/javascript” });
const swUrl = URL.createObjectURL(swBlob);
navigator.serviceWorker.register(swUrl).catch(() => {});
}
