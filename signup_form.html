<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>竹北社90期第一次會外會 報名表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8922A;
    --gold-light: #E8B84B;
    --gold-pale: #FDF3E3;
    --red: #C0392B;
    --green: #27AE60;
    --dark: #2C1810;
    --mid: #6B4C3B;
    --bg: #FBF6EF;
    --white: #FFFFFF;
    --border: #D4B896;
    --shadow: rgba(200,146,42,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--dark);
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #2C1810 0%, #5C3317 50%, #2C1810 100%);
    padding: 32px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(200,146,42,0.05) 20px,
      rgba(200,146,42,0.05) 21px
    );
  }
  .header-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.4;
    margin-bottom: 8px;
    position: relative;
  }
  .header h1 span {
    color: var(--gold-light);
  }
  .header-info {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 14px;
    position: relative;
  }
  .info-chip {
    background: rgba(200,146,42,0.2);
    border: 1px solid rgba(200,146,42,0.4);
    color: var(--gold-light);
    font-size: 14px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex;
    background: var(--white);
    border-bottom: 3px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .tab-btn {
    flex: 1;
    padding: 16px 10px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    border: none;
    background: transparent;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab-btn.active {
    color: var(--gold);
    background: var(--gold-pale);
    border-bottom: 3px solid var(--gold);
    margin-bottom: -3px;
  }
  .tab-btn:hover:not(.active) {
    background: #F5EDE0;
  }

  /* ── CONTENT ── */
  .tab-panel {
    display: none;
    padding: 24px 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  .tab-panel.active { display: block; }

  /* ── CARD ── */
  .card {
    background: #FFFFFF !important;
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 16px rgba(200,146,42,0.15);
    border: 1.5px solid #D4B896 !important;
    -webkit-appearance: none;
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 22px;
    background: var(--gold);
    border-radius: 2px;
  }

  /* ── FORM ── */
  .field {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 8px;
  }
  label .req {
    color: var(--red);
    margin-left: 4px;
  }
  input[type="text"],
  input[type="tel"],
  input[type="password"],
  select {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    border: 2px solid #D4B896 !important;
    border-radius: 10px;
    background: #FBF6EF !important;
    color: #2C1810;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
    box-sizing: border-box;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,146,42,0.15);
    background: var(--white);
  }

  /* 生日 */
  .birthday-row {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1.2fr;
    gap: 8px;
  }
  .birthday-label {
    font-size: 12px;
    color: var(--mid);
    text-align: center;
    margin-top: 4px;
  }

  /* 付款方式 */
  .pay-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .pay-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
  }
  .pay-option:has(input:checked) {
    border-color: var(--gold);
    background: var(--gold-pale);
  }
  .pay-option input[type="radio"] {
    width: 22px;
    height: 22px;
    accent-color: var(--gold);
    cursor: pointer;
    flex-shrink: 0;
  }
  .pay-label-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
  }
  .pay-icon {
    font-size: 22px;
    margin-left: auto;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--white);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(200,146,42,0.35);
    letter-spacing: 1px;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(200,146,42,0.45);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--white);
    color: var(--gold);
    border: 2px solid var(--gold);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--gold-pale); }

  /* ── ALERT ── */
  .alert {
    padding: 16px 18px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .alert-success { background: #E8F8EF; border: 1.5px solid #27AE60; color: #1A7A3F; }
  .alert-error   { background: #FDECEA; border: 1.5px solid #C0392B; color: #922B21; }
  .alert-info    { background: var(--gold-pale); border: 1.5px solid var(--gold); color: var(--mid); }
  .alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

  /* ── 查詢結果 ── */
  .result-card {
    background: var(--gold-pale);
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 20px;
    margin-top: 16px;
    animation: slideIn 0.3s ease;
  }
  .result-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 16px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-key { color: var(--mid); font-weight: 500; }
  .result-val { font-weight: 700; color: var(--dark); }

  /* ── 名單頁 ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Noto Serif TC', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
    display: block;
  }
  .stat-label { font-size: 13px; color: var(--mid); margin-top: 4px; }

  .pay-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .pay-tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
  }
  .pay-tag.linepay { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
  .pay-tag.transfer { background: #E3F2FD; color: #1565C0; border: 1px solid #90CAF9; }
  .pay-tag.cash { background: #FFF8E1; color: #F57F17; border: 1px solid #FFE082; }

  .member-list { display: flex; flex-direction: column; gap: 10px; }
  .member-item {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .member-num {
    width: 32px;
    height: 32px;
    background: var(--gold);
    color: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .member-info { flex: 1; }
  .member-name { font-size: 17px; font-weight: 700; color: var(--dark); }
  .member-sub { font-size: 13px; color: var(--mid); margin-top: 2px; }
  .member-pay {
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 12px;
  }

  /* Loading */
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid rgba(200,146,42,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint { font-size: 13px; color: var(--mid); margin-top: 6px; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  /* 搜尋框 */
  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .search-box input {
    flex: 1;
  }
  .search-box button {
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 700;
    background: var(--gold);
    color: var(--white);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--mid);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; }

  /* ── HEADER 裝飾 ── */
  .deco-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 14px;
    position: relative;
  }
  .deco-item {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(200,146,42,0.3);
    border-radius: 50%;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    backdrop-filter: blur(4px);
    animation: floatUp 3s ease-in-out infinite;
  }
  .deco-item:nth-child(2) { animation-delay: 0.4s; width:64px; height:64px; font-size:30px; }
  .deco-item:nth-child(3) { animation-delay: 0.8s; }
  .deco-item:nth-child(4) { animation-delay: 1.2s; }
  .deco-item:nth-child(5) { animation-delay: 1.6s; }
  @keyframes floatUp {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .header-divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    margin: 10px auto;
    position: relative;
  }
</style>
</head>
<body>

<div class="header">
  <div class="deco-bar">
    <div class="deco-item">🌿</div>
    <div class="deco-item">🍞</div>
    <div class="deco-item">🌾</div>
    <div class="deco-item">🍽️</div>
    <div class="deco-item">🌳</div>
  </div>
  <div class="header-badge">竹北社 90期</div>
  <h1>第一次<span>會外會</span><br>報名系統</h1>
  <div class="header-divider"></div>
  <div class="header-info">
    <div class="info-chip">📅 6月20日（六）</div>
    <div class="info-chip">📍 新城風糖休閒園區</div>
  </div>
  <div style="margin-top:14px; color:rgba(255,255,255,0.55); font-size:13px; position:relative;">
    新竹縣寶山鄉寶新路二段
  </div>
  <div style="margin-top:14px; display:flex; flex-wrap:wrap; justify-content:center; gap:8px; position:relative;">
    <div style="background:rgba(200,146,42,0.18);border:1px solid rgba(200,146,42,0.35);color:#F5D78E;font-size:13px;padding:5px 12px;border-radius:8px;">🍞 DIY黑糖爆漿包</div>
    <div style="background:rgba(200,146,42,0.18);border:1px solid rgba(200,146,42,0.35);color:#F5D78E;font-size:13px;padding:5px 12px;border-radius:8px;">🌿 休閒園區走走</div>
    <div style="background:rgba(200,146,42,0.18);border:1px solid rgba(200,146,42,0.35);color:#F5D78E;font-size:13px;padding:5px 12px;border-radius:8px;">🍽️ 新明餐廳午餐</div>
    <div style="background:rgba(200,146,42,0.18);border:1px solid rgba(200,146,42,0.35);color:#F5D78E;font-size:13px;padding:5px 12px;border-radius:8px;">💰 費用 $550（含保險）</div>
  </div>
  <div style="margin-top:14px; color:rgba(255,255,255,0.75); font-size:14px; letter-spacing:1px; position:relative;">
    曾湘雯 社長 ／ 張曉萍 總幹事　敬邀
  </div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('signup')">✍️ 報名</button>
  <button class="tab-btn" onclick="switchTab('query')">🔍 查詢</button>
  <button class="tab-btn" onclick="switchTab('list')">📋 名單</button>
</div>

<div id="tab-signup" class="tab-panel active">

  <div id="signup-alert"></div>

  <div class="card">
    <div class="card-title">個人資料（保險用）</div>

    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="f-name" placeholder="請輸入真實姓名" maxlength="20">
    </div>

    <div class="field">
      <label>出生年月日 <span class="req">*</span></label>
      <div class="birthday-row">
        <div>
          <select id="f-year" onchange="updateDays()"><option value="">── 年 ──</option></select>
          <div class="birthday-label">年</div>
        </div>
        <div>
          <select id="f-month" onchange="updateDays()"><option value="">── 月 ──</option></select>
          <div class="birthday-label">月</div>
        </div>
        <div>
          <select id="f-day"><option value="">── 日 ──</option></select>
          <div class="birthday-label">日</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>電話 <span class="req">*</span></label>
      <input type="tel" id="f-phone" placeholder="0912345678" maxlength="10"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');updatePhoneHint(this.value)">
      <div class="hint" id="phone-hint">請輸入 09 開頭，共 10 碼數字</div>
    </div>

    <div class="field">
      <label>身分證字號 <span class="req">*</span></label>
      <input type="text" id="f-id" placeholder="A123456789" maxlength="10"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');updateIdHint(this.value)"
        style="text-transform:uppercase">
      <div class="hint" id="id-hint">第1碼英文字母，第2碼為 1（男）或 2（女），後8碼數字</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">付款方式</div>
    <div class="pay-group">
      <label class="pay-option">
        <input type="radio" name="payment" value="Line Pay">
        <span class="pay-label-text">Line Pay</span>
        <span class="pay-icon">💚</span>
      </label>
      <label class="pay-option">
        <input type="radio" name="payment" value="轉帳">
        <span class="pay-label-text">轉帳</span>
        <span class="pay-icon">🏦</span>
      </label>
      <label class="pay-option">
        <input type="radio" name="payment" value="現金">
        <span class="pay-label-text">現金</span>
        <span class="pay-icon">💵</span>
      </label>
    </div>
  </div>

  <button class="btn-primary" id="submit-btn" onclick="submitForm()">✅ 確認送出報名</button>

  <div style="height:24px"></div>

</div>

<div id="tab-query" class="tab-panel">

  <div class="card">
    <div class="card-title">查詢報名狀態</div>
    <div class="field">
      <label>輸入姓名 或 電話</label>
      <input type="text" id="q-input" placeholder="王小明 或 0912345678">
      <div class="hint">擇一輸入即可查詢</div>
    </div>
    <button class="btn-primary" onclick="queryMember()">🔍 開始查詢</button>
  </div>

  <div id="query-result"></div>

</div>

<div id="tab-list" class="tab-panel">

  <div id="list-lock" class="card" style="text-align:center; padding:32px 20px;">
    <div style="font-size:48px; margin-bottom:12px;">🔒</div>
    <div class="card-title" style="justify-content:center; margin-bottom:8px;">幹部專區</div>
    <div style="color:var(--mid); font-size:15px; margin-bottom:20px;">請輸入幹部密碼以查看報名名單</div>
    <div class="field">
      <input type="password" id="list-password" placeholder="請輸入密碼"
        onkeydown="if(event.key==='Enter') verifyPassword()">
    </div>
    <button class="btn-primary" onclick="verifyPassword()">🔓 確認進入</button>
    <div id="pw-error" style="color:var(--red); font-size:14px; margin-top:12px;"></div>
  </div>

  <div id="list-content" style="display:none;">
    <div id="list-stats" class="stats-row">
      <div class="stat-box">
        <span class="stat-num" id="total-count">－</span>
        <div class="stat-label">報名總人數</div>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="today-count">－</span>
        <div class="stat-label">今日新增</div>
      </div>
    </div>

    <div class="card" style="padding:16px 14px">
      <div id="pay-breakdown" class="pay-stats"></div>
      <div class="search-box">
        <input type="text" id="list-search" placeholder="搜尋姓名…" oninput="filterList()">
        <button onclick="loadList()">重新整理</button>
      </div>
      <div id="member-list" class="member-list">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-text">載入中…</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// 🔧 設定區 — 這裡放你原本的 GAS URL
// ══════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxcCV98UnDL87tdcSx80gE5DWuriGYQSiQqT1l_T4dyvunp1cA_UDGjtpQZcXtgV45jnQ/exec';

// ══════════════════════════════════════════
// 初始化下拉選單
// ══════════════════════════════════════════
(function initDropdowns() {
  const ysel = document.getElementById('f-year');
  for (let y = 1940; y <= 2005; y++) {
    ysel.innerHTML += `<option value="${y}">${y} 年</option>`;
  }
  const msel = document.getElementById('f-month');
  for (let m = 1; m <= 12; m++) {
    msel.innerHTML += `<option value="${m}">${m} 月</option>`;
  }
  updateDays();
})();

// 依年月更新日期選項（防止2月30日等不合理日期）
function updateDays() {
  const year  = parseInt(document.getElementById('f-year').value)  || 2000;
  const month = parseInt(document.getElementById('f-month').value) || 1;
  const maxDay = new Date(year, month, 0).getDate(); // 該月最後一天
  const dsel = document.getElementById('f-day');
  const current = dsel.value;
  dsel.innerHTML = '<option value="">── 日 ──</option>';
  for (let d = 1; d <= maxDay; d++) {
    dsel.innerHTML += `<option value="${d}"${d == current ? ' selected' : ''}>${d} 日</option>`;
  }
}

// 電話即時提示
function updatePhoneHint(val) {
  const hint = document.getElementById('phone-hint');
  if (!val) {
    hint.style.color = 'var(--mid)';
    hint.textContent = '請輸入 09 開頭，共 10 碼數字';
  } else if (!val.startsWith('09')) {
    hint.style.color = 'var(--red)';
    hint.textContent = '⚠️ 電話需以 09 開頭';
  } else if (val.length < 10) {
    hint.style.color = 'var(--gold)';
    hint.textContent = `已輸入 ${val.length} 碼，還差 ${10 - val.length} 碼`;
  } else {
    hint.style.color = 'var(--green)';
    hint.textContent = '✅ 格式正確';
  }
}

// 身分證即時提示
function updateIdHint(val) {
  const hint = document.getElementById('id-hint');
  if (!val) {
    hint.style.color = 'var(--mid)';
    hint.textContent = '第1碼英文字母，第2碼為 1（男）或 2（女），後8碼數字';
    return;
  }
  if (!/^[A-Z]/.test(val)) {
    hint.style.color = 'var(--red)';
    hint.textContent = '⚠️ 第1碼必須是英文字母（已自動轉大寫）';
  } else if (val.length >= 2 && !/^[A-Z][12]/.test(val)) {
    hint.style.color = 'var(--red)';
    hint.textContent = '⚠️ 第2碼必須是 1（男）或 2（女）';
  } else if (val.length === 10 && /^[A-Z][12]\d{8}$/.test(val)) {
    hint.style.color = 'var(--green)';
    hint.textContent = '✅ 格式正確';
  } else {
    hint.style.color = 'var(--gold)';
    hint.textContent = `已輸入 ${val.length} 碼，共需 10 碼`;
  }
}

// ══════════════════════════════════════════
// 密碼設定（幹部專用）
// ══════════════════════════════════════════
const LIST_PASSWORD = '8866';  // ← 可自行修改密碼
let listUnlocked = false;

function verifyPassword() {
  const input = document.getElementById('list-password').value;
  if (input === LIST_PASSWORD) {
    listUnlocked = true;
    document.getElementById('list-lock').style.display = 'none';
    document.getElementById('list-content').style.display = 'block';
    loadList();
  } else {
    document.getElementById('pw-error').textContent = '❌ 密碼錯誤，請重新輸入';
    document.getElementById('list-password').value = '';
    document.getElementById('list-password').focus();
  }
}

// ══════════════════════════════════════════
// Tab 切換
// ══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'list' && listUnlocked) loadList();
}

// ══════════════════════════════════════════
// 工具：顯示提示 (優化捲動體驗)
// ══════════════════════════════════════════
function showAlert(containerId, type, icon, msg) {
  const container = document.getElementById(containerId);
  container.innerHTML =
    `<div class="alert alert-${type}"><span class="alert-icon">${icon}</span><span>${msg}</span></div>`;
  // 改為 'center'，確保畫面會精準地移動並讓訊息置中，避免被上方導航列遮住
  container.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ══════════════════════════════════════════
// 驗證身分證
// ══════════════════════════════════════════
function validateID(id) {
  const reg = /^[A-Z][12]\d{8}$/;
  return reg.test(id.toUpperCase());
}

// ══════════════════════════════════════════
// 報名送出 (優化 fetch 連線，繞過 CORS 限制)
// ══════════════════════════════════════════
async function submitForm() {
  const name    = document.getElementById('f-name').value.trim();
  const year    = document.getElementById('f-year').value;
  const month   = document.getElementById('f-month').value;
  const day     = document.getElementById('f-day').value;
  const phone   = document.getElementById('f-phone').value.trim().replace(/-/g, '');
  const idNum   = document.getElementById('f-id').value.trim().toUpperCase();
  const payment = document.querySelector('input[name="payment"]:checked');

  // 驗證
  if (!name || name.replace(/\s/g,'').length < 2)
    return showAlert('signup-alert', 'error', '⚠️', '請填寫真實姓名（至少2個字）');
  if (!year || !month || !day)
    return showAlert('signup-alert', 'error', '⚠️', '請選擇完整出生年月日');
  const cleanPhone = phone.replace(/[^0-9]/g,'');
  if (!cleanPhone.startsWith('09') || cleanPhone.length !== 10)
    return showAlert('signup-alert', 'error', '⚠️', '電話格式錯誤，請輸入 09 開頭共 10 碼數字');
  if (!validateID(idNum))
    return showAlert('signup-alert', 'error', '⚠️', '身分證字號格式錯誤<br>正確格式：第1碼英文、第2碼1或2、後8碼數字（例：A123456789）');
  if (!payment)
    return showAlert('signup-alert', 'error', '⚠️', '請選擇付款方式');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>送出中…';

  const birthday = `${year}/${String(month).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
  const payload = { action: 'signup', name, birthday, phone, idNum, payment: payment.value };

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      // 加入 headers 將 Content-Type 設為 text/plain，繞過 GAS 的 CORS 預檢限制
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      },
      redirect: 'follow', // 允許跟隨 GAS 的重新導向
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.status === 'duplicate') {
      showAlert('signup-alert', 'error', '🚫', `此身分證字號已報名過，無需重複報名！<br>如有疑問請聯絡主辦單位。`);
    } else if (data.status === 'success') {
      showAlert('signup-alert', 'success', '🎉', `<strong>${name}</strong> 報名成功！<br>我們將盡速確認您的資料，期待6月20日與您相見 🌿`);
      // 清空表單
      document.getElementById('f-name').value = '';
      document.getElementById('f-year').value = '';
      document.getElementById('f-month').value = '';
      document.getElementById('f-day').value = '';
      document.getElementById('f-phone').value = '';
      document.getElementById('f-id').value = '';
      document.querySelectorAll('input[name="payment"]').forEach(r => r.checked = false);
    } else {
      showAlert('signup-alert', 'error', '❌', '送出失敗，請稍後再試或聯絡主辦單位。');
    }
  } catch(e) {
    console.error(e);
    showAlert('signup-alert', 'error', '❌', '連線失敗，請確認網路後再試。');
  }

  btn.disabled = false;
  btn.innerHTML = '✅ 確認送出報名';
}

// ══════════════════════════════════════════
// 查詢 (同樣補上 headers 繞過限制)
// ══════════════════════════════════════════
async function queryMember() {
  const val = document.getElementById('q-input').value.trim();
  if (!val) return;

  document.getElementById('query-result').innerHTML =
    `<div class="alert alert-info"><span class="spinner"></span>查詢中…</div>`;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      },
      redirect: 'follow',
      body: JSON.stringify({ action: 'query', keyword: val })
    });
    const data = await res.json();

    if (data.status === 'found') {
      const m = data.member;
      const payClass = m.payment === 'Line Pay' ? 'linepay' : m.payment === '轉帳' ? 'transfer' : 'cash';
      document.getElementById('query-result').innerHTML = `
        <div class="result-card">
          <div class="result-title">✅ 查詢到報名紀錄</div>
          <div class="result-row"><span class="result-key">姓名</span><span class="result-val">${m.name}</span></div>
          <div class="result-row"><span class="result-key">生日</span><span class="result-val">${m.birthday}</span></div>
          <div class="result-row"><span class="result-key">電話</span><span class="result-val">${m.phone}</span></div>
          <div class="result-row">
            <span class="result-key">付款方式</span>
            <span class="pay-tag ${payClass}">${m.payment}</span>
          </div>
          <div class="result-row"><span class="result-key">報名時間</span><span class="result-val" style="font-size:14px">${m.timestamp}</span></div>
        </div>`;
    } else {
      document.getElementById('query-result').innerHTML =
        `<div class="alert alert-error"><span class="alert-icon">🔍</span>查無此報名紀錄，請確認輸入的姓名或電話是否正確。</div>`;
    }
  } catch(e) {
    console.error(e);
    document.getElementById('query-result').innerHTML =
      `<div class="alert alert-error"><span class="alert-icon">❌</span>連線失敗，請稍後再試。</div>`;
  }
}

// ══════════════════════════════════════════
// 名單 (同樣補上 headers 繞過限制)
// ══════════════════════════════════════════
async function loadList() {
  document.getElementById('member-list').innerHTML =
    `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">載入中…</div></div>`;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      },
      redirect: 'follow',
      body: JSON.stringify({ action: 'list' })
    });
    const data = await res.json();
    allMembers = data.members || [];
    renderList(allMembers);
  } catch(e) {
    console.error(e);
    document.getElementById('member-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">載入失敗，請重試</div></div>`;
  }
}

function renderList(members) {
  // 統計
  document.getElementById('total-count').textContent = members.length;
  const today = new Date().toLocaleDateString('zh-TW');
  const todayCount = members.filter(m => m.timestamp && m.timestamp.startsWith(today.replace(/\//g,'-'))).length;
  document.getElementById('today-count').textContent = todayCount || 0;

  const linepay  = members.filter(m => m.payment === 'Line Pay').length;
  const transfer = members.filter(m => m.payment === '轉帳').length;
  const cash     = members.filter(m => m.payment === '現金').length;

  document.getElementById('pay-breakdown').innerHTML = `
    <span class="pay-tag linepay">💚 Line Pay ${linepay}人</span>
    <span class="pay-tag transfer">🏦 轉帳 ${transfer}人</span>
    <span class="pay-tag cash">💵 現金 ${cash}人</span>
  `;

  if (members.length === 0) {
    document.getElementById('member-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">目前尚無報名</div></div>`;
    return;
  }

  const payClass = p => p === 'Line Pay' ? 'linepay' : p === '轉帳' ? 'transfer' : 'cash';
  document.getElementById('member-list').innerHTML = members.map((m, i) => `
    <div class="member-item">
      <div class="member-num">${i + 1}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-sub">${m.phone} ｜ ${m.birthday}</div>
      </div>
      <span class="pay-tag ${payClass(m.payment)} member-pay">${m.payment}</span>
    </div>
  `).join('');
}

function filterList() {
  const kw = document.getElementById('list-search').value.trim();
  if (!kw) { renderList(allMembers); return; }
  renderList(allMembers.filter(m => m.name.includes(kw)));
}

// 進入名單頁自動載入
document.addEventListener('DOMContentLoaded', () => {});
</script>
