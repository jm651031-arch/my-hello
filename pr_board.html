<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90 期公關組看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
  :root {
    --grass-deep: #2d5a1f;
    --grass-mid: #5fa830;
    --grass-light: #b6e25c;
    --grass-bright: #d4f04a;
    --sun: #fff9a0;
    --earth: #4a3520;
    --earth-light: #8b6f47;
    --sky: #c8e8f0;
    --cream: #fdfcf3;
    --pink: #f4a8c8;
    --shadow: rgba(74, 53, 32, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, var(--sky) 25%, #e8f5d8 50%, var(--grass-light) 100%);
    background-attachment: fixed;
    color: var(--earth);
    min-height: 100vh;
    line-height: 1.7;
    padding-bottom: 80px;
    overflow-x: hidden;
    font-size: 17px;
  }

  /* 雲朵裝飾 */
  body::before {
    content: '';
    position: fixed;
    top: 30px;
    left: -40px;
    width: 140px;
    height: 50px;
    background: white;
    border-radius: 50px;
    box-shadow:
      60px 30px 0 -10px white,
      200px 10px 0 -5px white,
      280px 50px 0 -15px white;
    opacity: 0.85;
    z-index: 0;
    pointer-events: none;
  }

  /* 草地底部 */
  body::after {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background:
      radial-gradient(ellipse at 20% 100%, var(--grass-deep) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, var(--grass-deep) 0%, transparent 50%),
      linear-gradient(180deg, transparent 0%, var(--grass-mid) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
  }

  /* === Header === */
  header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 20px;
  }

  .badge {
    display: inline-block;
    background: var(--grass-bright);
    color: var(--grass-deep);
    font-family: 'Caveat', cursive;
    font-size: 22px;
    padding: 4px 18px;
    border-radius: 20px;
    transform: rotate(-3deg);
    box-shadow: 3px 3px 0 var(--earth);
    margin-bottom: 12px;
    border: 2px solid var(--earth);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--earth);
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--earth-light);
    font-weight: 500;
  }

  .last-update {
    display: inline-block;
    margin-top: 10px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--grass-deep);
    background: var(--sun);
    padding: 3px 14px;
    border-radius: 12px;
    transform: rotate(1deg);
  }

  /* === 最新消息區 === */
  .news-board {
    background: var(--cream);
    border: 3px solid var(--earth);
    border-radius: 20px;
    padding: 16px 18px;
    margin-bottom: 24px;
    box-shadow: 5px 5px 0 var(--earth);
    position: relative;
  }

  .news-board::before {
    content: '📢';
    position: absolute;
    top: -18px;
    left: 16px;
    background: var(--sun);
    border: 2px solid var(--earth);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .news-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-left: 32px;
  }

  .news-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--earth);
  }

  .news-count {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--grass-deep);
  }

  .news-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .news-item {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    background: linear-gradient(90deg, rgba(214, 240, 74, 0.15) 0%, transparent 100%);
    border-radius: 10px;
    font-size: 16px;
    line-height: 1.6;
    border-left: 3px solid var(--grass-mid);
  }

  .news-item.hot {
    background: linear-gradient(90deg, rgba(244, 168, 200, 0.3) 0%, transparent 100%);
    border-left-color: var(--pink);
  }

  .news-item .news-date {
    flex-shrink: 0;
    font-family: 'Fraunces', serif;
    font-weight: 900;
    color: var(--grass-deep);
    min-width: 44px;
    font-size: 17px;
  }

  .news-item.hot .news-date {
    color: #c14b7e;
  }

  .news-item .news-text {
    color: var(--earth);
    flex: 1;
  }

  .news-item .hot-tag {
    display: inline-block;
    font-size: 12px;
    background: var(--pink);
    color: var(--earth);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 700;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* === Tab Navigation === */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 24px;
    background: rgba(253, 252, 243, 0.95);
    padding: 6px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 2px solid var(--earth);
    box-shadow: 4px 4px 0 var(--earth);
    position: sticky;
    top: 10px;
    z-index: 100;
  }

  .tab {
    padding: 16px 4px;
    text-align: center;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    color: var(--earth);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    border: none;
    font-family: inherit;
    line-height: 1.3;
  }

  .tab .icon { display: block; font-size: 32px; margin-bottom: 6px; }

  .tab.active {
    background: var(--grass-deep);
    color: var(--cream);
    transform: translateY(-2px);
  }

  /* === Section === */
  .section {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .section.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--earth);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--grass-mid) 0 8px, transparent 8px 14px);
    border-radius: 2px;
  }

  /* === Card 通用樣式 === */
  .card {
    background: var(--cream);
    border: 2px solid var(--earth);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 4px 4px 0 var(--earth);
    position: relative;
    transition: transform 0.2s;
  }

  .card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--earth); }

  .card-tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .tag-tm { background: var(--grass-bright); color: var(--grass-deep); }
  .tag-special { background: var(--pink); color: var(--earth); }
  .tag-edu { background: var(--sun); color: var(--earth); }
  .tag-out { background: var(--sky); color: var(--earth); }

  .card-date {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--grass-deep);
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--earth);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .card-meta {
    font-size: 16px;
    color: var(--earth);
    line-height: 2;
    background: rgba(255, 249, 160, 0.3);
    padding: 12px 14px;
    border-radius: 10px;
    border-left: 3px solid var(--grass-mid);
  }

  .card-meta strong {
    color: var(--grass-deep);
    font-weight: 700;
    margin-right: 4px;
  }

  /* 地點顯示（右上角浮動，點擊開地圖）*/
  .card-location {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 12px;
    color: var(--grass-deep);
    background: rgba(214, 240, 74, 0.4);
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
    border: 1.5px solid var(--grass-mid);
    max-width: 45%;
    text-align: center;
    line-height: 1.3;
    z-index: 1;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .card-location:hover,
  .card-location:active {
    background: rgba(214, 240, 74, 0.7);
    transform: translateY(-1px);
    box-shadow: 0 2px 4px rgba(74, 53, 32, 0.2);
  }

  /* === 拍照輪值 === */
  .photo-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .photo-slot {
    flex: 1;
    background: var(--grass-light);
    border: 2px solid var(--earth);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .photo-slot .label {
    font-size: 16px;
    color: var(--grass-deep);
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .photo-slot .name {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: var(--earth);
    font-weight: 700;
    line-height: 1.1;
  }

  .photo-slot.tbd { background: #f0f0e8; }
  .photo-slot.tbd .name { color: var(--earth-light); font-style: italic; }

  .no-photo {
    margin-top: 10px;
    font-size: 14px;
    color: var(--earth-light);
    font-style: italic;
    padding: 8px 12px;
    background: #f0f0e8;
    border-radius: 8px;
    text-align: center;
  }

  /* === 認領雙格（正 / 候補） === */
  .claim-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .claim-slot {
    flex: 1;
    background: var(--grass-light);
    border: 2px solid var(--earth);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .claim-slot.backup {
    background: var(--sun);
  }

  .claim-slot .label {
    font-size: 16px;
    color: var(--grass-deep);
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .claim-slot.backup .label {
    color: #8b5a1c;
  }

  .claim-slot .name {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: var(--earth);
    font-weight: 700;
    line-height: 1.1;
  }

  .claim-slot.tbd { background: #f0f0e8; }
  .claim-slot.tbd .name { color: var(--earth-light); font-style: italic; }

  /* === 區塊小標題（一張卡片內的 📸 拍照 / 🎤 TM 認領） === */
  .block-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--grass-deep);
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--earth-light);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .block-label:first-of-type {
    margin-top: 16px;
  }

  /* === 認領狀態 === */
  .status-pill {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 10px;
    margin-left: 6px;
  }

  .status-confirmed { background: var(--grass-bright); color: var(--grass-deep); }
  .status-pending { background: #ffd9a3; color: #8b5a1c; }
  .status-empty { background: #f0f0e8; color: var(--earth-light); }

  /* === 組聚 === */
  .meetup-next {
    background: linear-gradient(135deg, var(--grass-bright) 0%, var(--sun) 100%);
    border: 3px solid var(--earth);
    border-radius: 20px;
    padding: 22px;
    box-shadow: 5px 5px 0 var(--earth);
    margin-bottom: 16px;
    position: relative;
  }

  .meetup-next::before {
    content: '🌳';
    position: absolute;
    top: -16px;
    right: 16px;
    font-size: 36px;
  }

  .meetup-next .label {
    font-family: 'Caveat', cursive;
    font-size: 24px;
    color: var(--grass-deep);
    margin-bottom: 8px;
  }

  .meetup-next .when {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--earth);
    margin-bottom: 6px;
  }

  .meetup-next .where {
    font-size: 16px;
    color: var(--earth);
    font-weight: 500;
  }

  .meetup-history {
    margin-top: 20px;
  }

  .meetup-item {
    background: var(--cream);
    border: 2px solid var(--earth-light);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 15px;
  }

  .meetup-item .date {
    font-weight: 700;
    color: var(--grass-deep);
  }

  /* === 組員名單 === */
  .member-list {
    background: var(--cream);
    border: 2px solid var(--earth);
    border-radius: 18px;
    padding: 8px;
    box-shadow: 4px 4px 0 var(--earth);
  }

  .member-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 12px;
    border-bottom: 1px dashed var(--earth-light);
  }

  .member-row:last-child {
    border-bottom: none;
  }

  .member-tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 10px;
    flex-shrink: 0;
    min-width: 64px;
    text-align: center;
    border: 1.5px solid var(--earth);
  }

  /* 5 種分類顏色 */
  .role-leader { background: var(--grass-bright); color: var(--grass-deep); }
  .role-deputy { background: var(--sun); color: #8b5a1c; }
  .role-member { background: var(--sky); color: var(--earth); }
  .role-newbie { background: var(--pink); color: var(--earth); }
  .role-senior { background: #e0d4f0; color: #553a7a; }
  .role-default { background: #f0f0e8; color: var(--earth-light); }

  .member-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--earth);
    flex: 1;
  }

  .member-name .me-mark {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--grass-deep);
    margin-left: 6px;
  }

  .member-note {
    font-size: 13px;
    color: var(--earth-light);
    font-weight: 500;
    flex-shrink: 0;
    background: rgba(255, 249, 160, 0.4);
    padding: 3px 10px;
    border-radius: 8px;
    border: 1px solid var(--earth-light);
  }

  /* 組員區塊小標題（自動分隔線） */
  .member-section-label {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--earth-light);
    padding: 14px 12px 6px;
    letter-spacing: 1px;
  }

  .member-section-label:first-child {
    padding-top: 8px;
  }

  /* === 比賽 === */
  .race-card {
    background: var(--cream);
    border: 2px solid var(--earth);
    border-left: 6px solid var(--pink);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 3px 3px 0 var(--earth);
  }

  .race-date {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--earth);
  }

  .race-name {
    font-size: 16px;
    font-weight: 700;
    margin: 6px 0;
  }

  .race-cheer {
    background: var(--sun);
    border-radius: 10px;
    padding: 8px 12px;
    margin-top: 10px;
    font-size: 14px;
    color: var(--earth);
  }

  /* === 空狀態 === */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--earth-light);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state .text { font-size: 16px; line-height: 1.8; }

  /* === Footer === */
  footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--grass-deep);
  }


  /* === 拍照統計卡片 === */
  .photo-stats {
    background: linear-gradient(135deg, #fdfcf3 0%, var(--cream) 100%);
    border: 2px solid var(--earth);
    border-radius: 18px;
    padding: 18px 18px 16px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0 var(--earth);
    position: relative;
  }

  .photo-stats-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px dashed var(--grass-mid);
  }

  .photo-stats-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--earth);
  }

  .photo-stats-summary {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--grass-deep);
  }

  .stats-grid {
    display: grid;
    gap: 8px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    align-items: center;
    padding: 8px 10px;
    background: rgba(214, 240, 74, 0.15);
    border-radius: 10px;
    border-left: 3px solid var(--grass-mid);
  }

  .stats-row.is-me {
    background: rgba(244, 168, 200, 0.2);
    border-left-color: var(--pink);
  }

  .stats-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--earth);
  }

  .stats-name .me-mark {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: var(--grass-deep);
    margin-left: 4px;
  }

  .stats-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 8px;
    min-width: 50px;
    text-align: center;
  }

  .stats-main {
    background: var(--grass-bright);
    color: var(--grass-deep);
  }

  .stats-backup {
    background: var(--sun);
    color: #8b5a1c;
  }

  .stats-total {
    background: var(--earth);
    color: var(--cream);
    font-size: 13px;
    min-width: 38px;
  }

  .stats-empty-msg {
    text-align: center;
    color: var(--earth-light);
    font-size: 13px;
    padding: 8px;
    font-style: italic;
  }

  .loading-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--earth-light);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="badge">第 90 期 · 公關組</div>
    <h1>公關組看板</h1>
    <p class="subtitle">竹北健言社 · 吳怡樺整理</p>
    <div class="last-update" id="lastUpdate">載入中...</div>
  </header>

  <!-- 最新消息區 -->
  <div class="news-board">
    <div class="news-header">
      <span class="news-title">最新消息</span>
      <span class="news-count" id="newsCount">- 則</span>
    </div>
    <div class="news-list" id="newsList">
      <div class="loading-state">📡 載入中...</div>
    </div>
  </div>

  <!-- Tab 導航 -->
  <nav class="tabs">
    <button class="tab active" data-target="schedule">
      <span class="icon">📅</span>課程
    </button>
    <button class="tab" data-target="meetup">
      <span class="icon">🌳</span>組聚
    </button>
    <button class="tab" data-target="members">
      <span class="icon">👥</span>組員
    </button>
  </nav>

  <!-- 1. 課程 -->
  <section class="section active" id="schedule">
    <h2 class="section-title">課程</h2>
    <div id="photoStats"></div>
    <div id="scheduleList">
      <div class="loading-state">📡 載入中...</div>
    </div>
  </section>

  <!-- 2. 組聚 -->
  <section class="section" id="meetup">
    <h2 class="section-title">組聚資訊</h2>
    <div id="meetupContent">
      <div class="loading-state">📡 載入中...</div>
    </div>
  </section>

  <!-- 3. 組員 -->
  <section class="section" id="members">
    <h2 class="section-title">公關組組員</h2>
    <div id="membersList">
      <div class="loading-state">📡 載入中...</div>
    </div>
  </section>

  <footer>
    🌿 90 期 · 公關組 · 一起留下美好瞬間 🌿
  </footer>

</div>

<script>
  // ============= CSV 資料來源 =============
  const CSV_URLS = {
    news:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdAMSrmstWZe0RUIEGsNq5ijkAlTff7NrkLhu-gs64ZMc8lQRBpKVoZFv_PRS28MSHZ59HDvTteZqC/pub?gid=874135733&single=true&output=csv',
    schedule: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdAMSrmstWZe0RUIEGsNq5ijkAlTff7NrkLhu-gs64ZMc8lQRBpKVoZFv_PRS28MSHZ59HDvTteZqC/pub?gid=1488154012&single=true&output=csv',
    meetup:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdAMSrmstWZe0RUIEGsNq5ijkAlTff7NrkLhu-gs64ZMc8lQRBpKVoZFv_PRS28MSHZ59HDvTteZqC/pub?gid=803247474&single=true&output=csv',
    members:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdAMSrmstWZe0RUIEGsNq5ijkAlTff7NrkLhu-gs64ZMc8lQRBpKVoZFv_PRS28MSHZ59HDvTteZqC/pub?gid=1356962557&single=true&output=csv'
  };

  // ============= CSV Parser =============
  // 處理引號、逗號、換行
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = '';
    let inQuote = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const next = text[i + 1];

      if (inQuote) {
        if (c === '"' && next === '"') {
          cell += '"';
          i++;
        } else if (c === '"') {
          inQuote = false;
        } else {
          cell += c;
        }
      } else {
        if (c === '"') {
          inQuote = true;
        } else if (c === ',') {
          row.push(cell);
          cell = '';
        } else if (c === '\n' || c === '\r') {
          if (c === '\r' && next === '\n') i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += c;
        }
      }
    }
    if (cell !== '' || row.length > 0) {
      row.push(cell);
      rows.push(row);
    }
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  // CSV → 物件陣列（用第一列當 key）
  function csvToObjects(text) {
    const rows = parseCSV(text);
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = (row[i] || '').trim();
      });
      return obj;
    });
  }

  // ============= 工具函式 =============
  // HTML escape，防止資料含特殊字元
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // 從日期字串自動算星期幾（傳入「6/1」這樣的格式）
  // 如果使用者已經寫了「(六)」，就直接用，不要覆蓋
  function formatDate(dateStr) {
    if (!dateStr) return '';
    // 已經有星期，直接傳回
    if (/[一二三四五六日]/.test(dateStr)) {
      return dateStr.replace(/\s*\(/, '（').replace(/\)/, '）');
    }
    // 試著解析「M/D」格式，假設今年 2026
    const match = dateStr.match(/(\d{1,2})[\/\-](\d{1,2})/);
    if (!match) return dateStr;
    const [_, m, d] = match;
    const year = 2026;
    const dt = new Date(year, parseInt(m) - 1, parseInt(d));
    if (isNaN(dt.getTime())) return dateStr;
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    return `${dateStr}（${weekdays[dt.getDay()]}）`;
  }

  // 課程主題去掉前綴的「TM 」「會外會：」等，產生標籤
  function getTagFromTopic(topic, type) {
    if (!topic && !type) return null;
    const text = (type || topic || '').toString();
    if (text.includes('會外會')) return { class: 'tag-special', text: '會外會' };
    if (text.includes('TM 菁英示範') || text.includes('TM 老幹')) return { class: 'tag-tm', text: 'TM 菁英示範' };
    if (text.startsWith('TM ') || text.includes(' TM ') || text.includes('TM ')) return { class: 'tag-tm', text: 'TM' };
    if (text.includes('專題')) return { class: 'tag-edu', text: '專題' };
    if (text.includes('社員大會') || text.includes('結業') || text.includes('交接')) return { class: 'tag-out', text: '大型活動' };
    if (text.includes('幹部') || text.includes('共識')) return { class: 'tag-out', text: '幹部' };
    if (text.includes('相見歡')) return { class: 'tag-out', text: '相見歡' };
    if (text.includes('金口獎')) return { class: 'tag-special', text: '金口獎' };
    if (text.includes('辯論')) return { class: 'tag-edu', text: '辯論賽' };
    return null;
  }

  // ============= 渲染：最新消息 =============
  function renderNews(rows) {
    const list = document.getElementById('newsList');
    const count = document.getElementById('newsCount');

    if (!rows || rows.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="text">目前沒有消息</div></div>';
      count.textContent = '0 則';
      return;
    }

    count.textContent = `${rows.length} 則`;
    list.innerHTML = rows.map(r => {
      const isHot = (r['重要度'] || '').includes('急');
      const hotTag = isHot ? '<span class="hot-tag">急</span>' : '';
      return `
        <div class="news-item${isHot ? ' hot' : ''}">
          <span class="news-date">${esc(r['日期'])}</span>
          <span class="news-text">${hotTag}${esc(r['訊息'])}</span>
        </div>
      `;
    }).join('');
  }

  // ============= 渲染：拍照統計 =============
  function renderPhotoStats(rows) {
    const container = document.getElementById('photoStats');
    if (!rows || rows.length === 0) {
      container.innerHTML = '';
      return;
    }

    // 統計每人主拍/機動次數
    const stats = {};
    let totalSessions = 0;
    let assignedSessions = 0;

    rows.forEach(r => {
      const main = (r['主拍'] || '').trim();
      const backup = (r['機動'] || '').trim();

      // 算這場有沒有「需要拍照」
      // 條件：主拍或機動其中一個有填字的，就算需要拍照的場次
      if (main || backup) {
        totalSessions++;
        if (main && backup) assignedSessions++;
      }

      if (main) {
        if (!stats[main]) stats[main] = { main: 0, backup: 0 };
        stats[main].main++;
      }
      if (backup) {
        if (!stats[backup]) stats[backup] = { main: 0, backup: 0 };
        stats[backup].backup++;
      }
    });

    const names = Object.keys(stats);
    if (names.length === 0) {
      container.innerHTML = '';
      return;
    }

    // 排序：總場次多的優先
    names.sort((a, b) => {
      const ta = stats[a].main + stats[a].backup;
      const tb = stats[b].main + stats[b].backup;
      return tb - ta;
    });

    const totalAssigned = names.reduce((sum, n) => sum + stats[n].main + stats[n].backup, 0);
    const avg = (totalAssigned / names.length).toFixed(1);

    let html = `
      <div class="photo-stats">
        <div class="photo-stats-header">
          <span class="photo-stats-title">📸 拍照統計</span>
          <span class="photo-stats-summary">${names.length} 人 · 平均 ${avg} 場</span>
        </div>
        <div class="stats-grid">
    `;

    names.forEach(name => {
      const s = stats[name];
      const total = s.main + s.backup;
      const isMe = name === '吳怡樺';
      const meMark = isMe ? '<span class="me-mark">← me</span>' : '';

      html += `
        <div class="stats-row${isMe ? ' is-me' : ''}">
          <span class="stats-name">${esc(name)}${meMark}</span>
          <span class="stats-badge stats-main">主 ${s.main}</span>
          <span class="stats-badge stats-backup">機 ${s.backup}</span>
          <span class="stats-badge stats-total">${total}</span>
        </div>
      `;
    });

    html += `
        </div>
      </div>
    `;

    container.innerHTML = html;
  }

  // ============= 渲染：課程 =============
  function renderSchedule(rows) {
    const container = document.getElementById('scheduleList');

    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="emoji">🌱</div><div class="text">課程資料載入中或為空</div></div>';
      return;
    }

    container.innerHTML = rows.map(r => {
      const date = r['日期'] || '';
      const topic = r['活動/課程主題'] || '';
      const role = r['關鍵角色'] || '';
      const location = r['地點'] || '';
      const photo1 = r['主拍'] || '';
      const photo2 = r['機動'] || '';
      const tm1Topic = r['TM1題目'] || '';
      const tm1Main = r['TM1正取'] || '';
      const tm1Sub = r['TM1候補'] || '';
      const tm2Topic = r['TM2題目'] || '';
      const tm2Main = r['TM2正取'] || '';
      const tm2Sub = r['TM2候補'] || '';

      // 標籤
      const tag = getTagFromTopic(topic, '');
      const tagHtml = tag ? `<span class="card-tag ${tag.class}">${esc(tag.text)}</span>` : '';

      // 關鍵角色（直接顯示原文）
      const roleHtml = role
        ? `<div class="card-meta">${esc(role)}</div>`
        : '';

      // 地點顯示（點擊開地圖）
      const locationHtml = location
        ? `<a class="card-location" href="https://www.google.com/maps/search/${encodeURIComponent(location)}" target="_blank" rel="noopener">📍 ${esc(location)}</a>`
        : '';

      // 拍照區塊（兩個都空白才隱藏）
      let photoHtml = '';
      if (photo1 || photo2) {
        photoHtml = `
          <div class="block-label">📸 拍照</div>
          <div class="photo-row">
            <div class="photo-slot${photo1 ? '' : ' tbd'}">
              <div class="label">主拍</div>
              <div class="name">${esc(photo1 || '待認領')}</div>
            </div>
            <div class="photo-slot${photo2 ? '' : ' tbd'}">
              <div class="label">機動</div>
              <div class="name">${esc(photo2 || '待認領')}</div>
            </div>
          </div>
        `;
      }

      // TM 認領 1
      let tm1Html = '';
      if (tm1Topic || tm1Main || tm1Sub) {
        const label = tm2Topic || tm2Main || tm2Sub
          ? `🎤 TM 認領 ① ${esc(tm1Topic)}`
          : (tm1Topic ? `🎤 TM 認領：${esc(tm1Topic)}` : '🎤 TM 認領');
        tm1Html = `
          <div class="block-label">${label}</div>
          <div class="claim-row">
            <div class="claim-slot${tm1Main ? '' : ' tbd'}">
              <div class="label">正取</div>
              <div class="name">${esc(tm1Main || '待認領')}</div>
            </div>
            <div class="claim-slot backup${tm1Sub ? '' : ' tbd'}">
              <div class="label">候補</div>
              <div class="name">${esc(tm1Sub || '待認領')}</div>
            </div>
          </div>
        `;
      }

      // TM 認領 2
      let tm2Html = '';
      if (tm2Topic || tm2Main || tm2Sub) {
        tm2Html = `
          <div class="block-label">🎤 TM 認領 ② ${esc(tm2Topic)}</div>
          <div class="claim-row">
            <div class="claim-slot${tm2Main ? '' : ' tbd'}">
              <div class="label">正取</div>
              <div class="name">${esc(tm2Main || '待認領')}</div>
            </div>
            <div class="claim-slot backup${tm2Sub ? '' : ' tbd'}">
              <div class="label">候補</div>
              <div class="name">${esc(tm2Sub || '待認領')}</div>
            </div>
          </div>
        `;
      }

      return `
        <div class="card">
          ${tagHtml}
          <div class="card-date">${esc(formatDate(date))}</div>
          <div class="card-title">${esc(topic)}</div>
          ${locationHtml}
          ${roleHtml}
          ${photoHtml}
          ${tm1Html}
          ${tm2Html}
        </div>
      `;
    }).join('');
  }

  // ============= 渲染：組聚 =============
  function renderMeetup(rows) {
    const container = document.getElementById('meetupContent');

    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="emoji">🌱</div><div class="text">尚未安排組聚</div></div>';
      return;
    }

    // 找下次組聚（狀態 = 已確定，且日期最近）
    const upcoming = rows.find(r => (r['狀態'] || '').includes('已確定') || (r['狀態'] || '').includes('提議'));
    const others = rows.filter(r => r !== upcoming);

    let html = '';

    if (upcoming) {
      html += `
        <div class="meetup-next">
          <div class="label">下次組聚</div>
          <div class="when">${esc(upcoming['日期'])} ${esc(upcoming['時間'])}</div>
          <div class="where">📍 ${esc(upcoming['地點'])}</div>
          ${upcoming['主題'] ? `<div class="where" style="margin-top:6px;">${esc(upcoming['主題'])}</div>` : ''}
        </div>
      `;
    }

    if (others.length > 0) {
      html += '<div class="meetup-history">';
      others.forEach(r => {
        const isPast = (r['狀態'] || '').includes('已結束');
        html += `
          <div class="meetup-item"${isPast ? ' style="opacity: 0.6;"' : ''}>
            <span class="date">${esc(r['日期'])}</span>${r['時間'] ? ` ${esc(r['時間'])}` : ''} · ${esc(r['地點'] || '待定')}${r['主題'] ? ` · ${esc(r['主題'])}` : ''}${isPast ? ' ✅' : ''}
          </div>
        `;
      });
      html += '</div>';
    }

    container.innerHTML = html;
  }

  // ============= 渲染：組員 =============
  function renderMembers(rows) {
    const container = document.getElementById('membersList');

    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="text">名單建立中</div></div>';
      return;
    }

    const roleClassMap = {
      '組長': 'role-leader',
      '副組長': 'role-deputy',
      '組員': 'role-member',
      '新人': 'role-newbie',
      '前社長': 'role-senior'
    };

    const html = '<div class="member-list">' + rows.map(r => {
      const role = r['分類'] || '';
      const name = r['姓名'] || '';
      const note = r['備註'] || '';
      const cls = roleClassMap[role] || 'role-default';
      const isMe = name === '吳怡樺';
      const meMark = isMe ? '<span class="me-mark">← me</span>' : '';
      const noteHtml = note ? `<span class="member-note">${esc(note)}</span>` : '';

      return `
        <div class="member-row">
          <span class="member-tag ${cls}">${esc(role)}</span>
          <span class="member-name">${esc(name)}${meMark}</span>
          ${noteHtml}
        </div>
      `;
    }).join('') + '</div>';

    container.innerHTML = html;
  }

  // ============= 載入所有資料 =============
  async function loadAll() {
    try {
      // 加上時間戳防快取
      const ts = Date.now();
      const fetchCSV = url => fetch(`${url}&t=${ts}`).then(r => r.text());

      const [newsCSV, scheduleCSV, meetupCSV, membersCSV] = await Promise.all([
        fetchCSV(CSV_URLS.news),
        fetchCSV(CSV_URLS.schedule),
        fetchCSV(CSV_URLS.meetup),
        fetchCSV(CSV_URLS.members)
      ]);

      const scheduleData = csvToObjects(scheduleCSV);
      renderNews(csvToObjects(newsCSV));
      renderPhotoStats(scheduleData);
      renderSchedule(scheduleData);
      renderMeetup(csvToObjects(meetupCSV));
      renderMembers(csvToObjects(membersCSV));

      // 更新時間
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('lastUpdate').textContent =
        `最後更新 ${now.getMonth() + 1}/${now.getDate()} ${hh}:${mm}`;
    } catch (err) {
      console.error('載入失敗', err);
      document.getElementById('lastUpdate').textContent = '⚠️ 載入失敗';
      ['newsList', 'scheduleList', 'meetupContent', 'membersList'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><div class="text">載入失敗，請稍後再試</div></div>';
      });
    }
  }

  // ============= Tab 切換 =============
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.target;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(target).classList.add('active');
    });
  });

  // 啟動
  loadAll();
</script>

</body>
</html>
