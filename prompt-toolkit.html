<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 提示詞工具箱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');
  :root{--ink:#1a1208;--paper:#f5f0e8;--gold:#c9a84c;--gold-light:#e8d5a0;--rust:#8b3a2a;--sage:#4a6741;--blue-deep:#1e3a5f;--cream:#faf7f0;--shadow:rgba(26,18,8,0.15)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--paper);color:var(--ink);font-family:"Noto Serif TC",serif;min-height:100vh}
  .section-banner{padding:40px 24px 32px;border-bottom:1px solid var(--gold-light);position:relative;text-align:center}
  .banner-unified{background:var(--ink)}
  .banner-unified::before{display:none}
  .banner-label{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;color:var(--gold-light)}
  .banner-title{font-family:"Playfair Display",serif;font-size:clamp(24px,4vw,38px);line-height:1.2;margin-bottom:8px;color:var(--gold)}
  .banner-sub{font-size:13px;color:#8b7355}
  .banner-unified .banner-sub{color:#8a8070}
  .filter-wrap{position:sticky;top:0;z-index:50;background:var(--cream);border-bottom:1px solid var(--gold-light);padding:8px 12px}
  .categories{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .cat-btn{padding:7px 4px;border:1px solid var(--gold-light);background:transparent;cursor:pointer;font-family:"Noto Serif TC",serif;font-size:11px;color:#6b5a3a;transition:all .2s;white-space:nowrap;text-align:center;border-radius:6px}
  .cat-btn.active{background:var(--ink);color:var(--gold);border-color:var(--ink)}
  .search-wrap{padding:0 16px 12px;background:var(--cream)}
  .search-input{width:100%;padding:10px 14px;border:1px solid var(--gold-light);border-radius:6px;background:white;font-family:"Noto Serif TC",serif;font-size:14px;color:var(--ink)}
  .search-input:focus{outline:none;border-color:var(--gold)}
  .container{max-width:960px;margin:0 auto;padding:32px 20px}
  .section-label{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:24px 0 16px;padding-left:4px}
  .section-label.news-label{color:#4a9eff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:40px}
  .card{background:white;border:1px solid var(--gold-light);border-radius:10px;padding:20px;cursor:pointer;transition:all .2s}
  .card:hover{border-color:var(--gold);box-shadow:0 4px 16px var(--shadow);transform:translateY(-2px)}
  .card.news-card{background:#0d1f35;border-color:#1a3a5f}
  .card.news-card:hover{border-color:#4a9eff;box-shadow:0 4px 16px rgba(74,158,255,0.2)}
  .card.hidden{display:none}
  .card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
  .card-cat{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .card-title{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.4}
  .card-desc{font-size:12px;color:#8b7355;line-height:1.5}
  .news-card .card-cat{color:#4a9eff}
  .news-card .card-title{color:#e0eeff}
  .news-card .card-desc{color:#6a90b0}
  .card-actions{display:flex;gap:8px;margin-top:14px}
  .btn-copy,.btn-expand{padding:7px 14px;border-radius:5px;font-size:12px;cursor:pointer;transition:all .2s;font-family:"Noto Serif TC",serif}
  .btn-copy{background:var(--ink);color:var(--gold);border:none;flex:1}
  .btn-copy:hover{background:#333}
  .btn-copy.copied{background:var(--sage);color:white}
  .btn-expand{background:transparent;color:var(--ink);border:1px solid var(--gold-light)}
  .btn-expand:hover{border-color:var(--gold)}
  .news-card .btn-copy{background:#1a5f8a;color:#e0eeff}
  .news-card .btn-expand{background:transparent;color:#6a90b0;border-color:#1a3a5f}
  .news-card .btn-expand:hover{border-color:#4a9eff;color:#e0eeff}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:white;border-radius:12px;max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
  .modal.news-modal{background:#0d1f35;border:1px solid #1a3a5f}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--gold-light);display:flex;align-items:flex-start;gap:12px}
  .news-modal .modal-header{border-bottom-color:#1a3a5f}
  .modal-num{font-family:"Playfair Display",serif;font-size:28px;color:var(--gold-light);line-height:1;flex-shrink:0}
  .modal-tag{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:2px;padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:4px}
  .tag-tm{background:#f5ead0;color:var(--rust)}
  .tag-biz{background:#d0e8ff;color:var(--blue-deep)}
  .tag-news{background:#0a2a4a;color:#4a9eff;border:1px solid #1a3a5f}
  .modal-title{font-size:18px;font-weight:600}
  .news-modal .modal-title{color:#e0eeff}
  .modal-body{padding:20px 24px;overflow-y:auto;flex:1}
  .modal-text{width:100%;min-height:200px;padding:14px;border:1px solid var(--gold-light);border-radius:8px;font-family:"Noto Serif TC",serif;font-size:14px;line-height:1.8;resize:vertical;color:var(--ink)}
  .news-modal .modal-text{background:#0a1a2e;border-color:#1a3a5f;color:#e0eeff}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--gold-light);display:flex;gap:10px}
  .news-modal .modal-footer{border-top-color:#1a3a5f}
  .modal-copy-btn{flex:1;padding:12px;background:var(--ink);color:var(--gold);border:none;border-radius:6px;font-size:14px;cursor:pointer;font-family:"Noto Serif TC",serif;transition:all .2s}
  .modal-copy-btn:hover{background:#333}
  .modal-copy-btn.copied{background:var(--sage);color:white}
  .news-modal .modal-copy-btn{background:#1a5f8a;color:#e0eeff}
  .modal-close-btn{padding:12px 20px;background:transparent;color:#6b5a3a;border:1px solid var(--gold-light);border-radius:6px;font-size:14px;cursor:pointer;font-family:"Noto Serif TC",serif}
  .news-modal .modal-close-btn{color:#6a90b0;border-color:#1a3a5f}
  .banner-credit{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:3px;color:#5a5040;margin-top:10px;text-transform:uppercase}
  .theme-badge{position:fixed;bottom:14px;left:14px;z-index:999;background:rgba(0,0,0,0.5);color:#fff;font-family:"DM Mono",monospace;font-size:10px;padding:4px 12px;border-radius:20px;backdrop-filter:blur(6px);letter-spacing:1px;pointer-events:none;transition:opacity 0.5s}
  #toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--gold);padding:10px 20px;border-radius:6px;font-size:13px;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999}
  #toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

prompts.forEach(p=>{
const grid=document.getElementById(p.grid);
const card=document.createElement(“div”);
card.className=“card”+(p.isNews?” news-card”:””);
card.dataset.cat=p.cat;card.dataset.id=p.id;
card.innerHTML=`<div class="card-icon" style="background:${p.iconBg}">${p.icon}</div><div class="card-cat">${p.catLabel}</div><div class="card-title">${p.title}</div><div class="card-desc">${p.desc}</div><div class="card-actions"><button class="btn-copy" onclick="quickCopy(event,${p.id})">⊕ 複製</button><button class="btn-expand" onclick="openModal(${p.id})">展開</button></div>`;
grid.appendChild(card);
});

function quickCopy(e,id){e.stopPropagation();const btn=e.target;navigator.clipboard.writeText(prompts[id].text).then(()=>{btn.textContent=“✓ 已複製”;btn.classList.add(“copied”);showToast();setTimeout(()=>{btn.textContent=“⊕ 複製”;btn.classList.remove(“copied”)},2000)})}
function openModal(id){const p=prompts[id];document.getElementById(“modalNum”).textContent=p.num;const tag=document.getElementById(“modalTag”);tag.textContent=p.catLabel;tag.className=“modal-tag “+p.catClass;document.getElementById(“modalTitle”).textContent=p.title;document.getElementById(“modalText”).value=p.text;const box=document.getElementById(“modalBox”);box.className=“modal”+(p.isNews?” news-modal”:””);document.getElementById(“modalOverlay”).classList.add(“open”);document.body.style.overflow=“hidden”}
function closeModal(){document.getElementById(“modalOverlay”).classList.remove(“open”);document.body.style.overflow=””}
function closeModalOnOverlay(e){if(e.target===document.getElementById(“modalOverlay”))closeModal()}
function copyFromModal(){const text=document.getElementById(“modalText”).value;const btn=document.getElementById(“modalCopyBtn”);navigator.clipboard.writeText(text).then(()=>{btn.textContent=“✓ 已複製”;btn.classList.add(“copied”);showToast();setTimeout(()=>{btn.textContent=“⊕ 複製全部”;btn.classList.remove(“copied”)},2000)})}
function showToast(){const t=document.getElementById(“toast”);t.classList.add(“show”);setTimeout(()=>t.classList.remove(“show”),2200)}
function filterCat(cat,btn){document.querySelectorAll(”.cat-btn”).forEach(b=>b.classList.remove(“active”));btn.classList.add(“active”);document.querySelectorAll(”.card”).forEach(card=>{card.classList.toggle(“hidden”,cat!==“all”&&card.dataset.cat!==cat)})}
function filterCards(query){const q=query.toLowerCase();document.querySelectorAll(”.card”).forEach(card=>{const id=parseInt(card.dataset.id);const p=prompts[id];const text=(p.title+p.text+p.catLabel).toLowerCase();card.classList.toggle(“hidden”,q.length>0&&!text.includes(q))})}
document.addEventListener(“keydown”,e=>{if(e.key===“Escape”)closeModal()});
</script>

  {name:"星空深藍",bg:"#020b18",surface:"#051628",ink:"#d0e8ff",gold:"#60a5fa",accent:"#93c5fd",bar:"linear-gradient(90deg,#1e3a5f,#2563eb,#60a5fa,#93c5fd)"},
  // 31. 琥珀暖光
  {name:"琥珀暖光",bg:"#fff8e8",surface:"white",ink:"#1a1000",gold:"#b45309",accent:"#fbbf24",bar:"linear-gradient(90deg,#78350f,#b45309,#fbbf24,#78350f)"},
  // 32. 霜白銀
  {name:"霜白銀",bg:"#f8f9fa",surface:"white",ink:"#1a1a2e",gold:"#6c757d",accent:"#adb5bd",bar:"linear-gradient(90deg,#343a40,#6c757d,#adb5bd,#343a40)"},
];

function applyTheme(t) {
const r = document.documentElement.style;
r.setProperty(’–paper’, t.bg);
r.setProperty(’–cream’, t.bg);
r.setProperty(’–ink’, t.ink);
r.setProperty(’–gold’, t.gold);
r.setProperty(’–gold-light’, t.gold + ‘55’);
r.setProperty(’–rust’, t.accent);
r.setProperty(’–shadow’, ‘rgba(0,0,0,0.15)’);
// banner
const banner = document.querySelector(’.banner-unified’);
if (banner) {
banner.style.background = t.ink;
const before = document.getElementById(‘bannerBar’);
if (before) before.style.background = t.bar;
}
// filter bar bg
const fw = document.querySelector(’.filter-wrap’);
const sw = document.querySelector(’.search-wrap’);
if (fw) fw.style.background = t.bg;
if (sw) sw.style.background = t.bg;
// badge
const badge = document.getElementById(‘themeBadge’);
if (badge) {
badge.textContent = ’🎨 ’ + t.name;
badge.style.opacity = ‘1’;
setTimeout(() => badge.style.opacity = ‘0’, 3000);
}
}

// Pick random theme on load
const t = THEMES[Math.floor(Math.random() * THEMES.length)];
window.addEventListener(‘DOMContentLoaded’, () => applyTheme(t));
</script>
