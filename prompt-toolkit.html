<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 提示詞工具箱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--ink:#1a1a2e;--bg:#f8f9fc;--white:#fff;--gold:#c9a84c;--gold-light:#f0e0a8;--rust:#8b3a2a;--sage:#3a6b5a;--blue:#1e3a6f;--biz-dark:#0f1f3d;--biz-blue:#1a4a8a;--biz-accent:#e8a020;--biz-light:#eef2f9;--shadow:rgba(15,31,61,.12);--radius:10px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:17px;line-height:1.8;min-height:100vh}
  .top-banner{background:var(--biz-dark);color:#aab8d0;text-align:center;padding:10px 16px;font-size:13px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-banner span{color:var(--biz-accent);font-weight:700}
  .section-header{padding:40px 24px 28px;text-align:center;position:relative}
  .section-header.tm{background:linear-gradient(135deg,#1a1208 0%,#2d200a 100%);color:#f5f0e8}
  .section-header.biz{background:linear-gradient(135deg,var(--biz-dark) 0%,#1a3a6a 100%);color:white}
  .section-header::before{content:'';position:absolute;top:0;left:0;right:0;height:5px}
  .section-header.tm::before{background:linear-gradient(90deg,#8b3a2a,#c9a84c,#4a6741,#1e3a5f)}
  .section-header.biz::before{background:linear-gradient(90deg,#1a4a8a,#e8a020,#1a6a4a,#5a3a8f)}
  .section-tag{display:inline-block;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:12px;font-family:'DM Mono',monospace}
  .tm .section-tag{background:rgba(201,168,76,.2);color:#c9a84c;border:1px solid rgba(201,168,76,.3)}
  .biz .section-tag{background:rgba(232,160,32,.2);color:#e8a020;border:1px solid rgba(232,160,32,.3)}
  .section-header h1{font-family:'Noto Serif TC',serif;font-size:clamp(22px,4vw,36px);font-weight:700;line-height:1.3;margin-bottom:8px}
  .section-header p{font-size:15px;opacity:.75}
  .search-wrap{max-width:480px;margin:20px auto 0;position:relative}
  .search-wrap input{width:100%;padding:13px 20px 13px 46px;border-radius:30px;border:none;font-size:16px;font-family:'Noto Sans TC',sans-serif;outline:none;box-shadow:0 2px 12px rgba(0,0,0,.15)}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
  .tabs-wrap{background:white;border-bottom:2px solid #e8edf5;padding:0 16px;display:flex;justify-content:center;flex-wrap:wrap;gap:4px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .tab-btn{padding:14px 16px;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:15px;color:#6b7a9a;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
  .tab-btn:hover{color:var(--ink)}
  .tab-btn.active-tm{color:#8b3a2a;border-bottom-color:#c9a84c;font-weight:700}
  .tab-btn.active-biz{color:var(--biz-blue);border-bottom-color:var(--biz-accent);font-weight:700}
  .container{max-width:1000px;margin:0 auto;padding:32px 20px 60px}
  .group-label{font-size:13px;letter-spacing:3px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid;display:flex;align-items:center;gap:10px}
  .group-label.tm-label{color:#8b3a2a;border-color:#e8d5a0}
  .group-label.biz-label{color:var(--biz-blue);border-color:#c8d8f0}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:48px}
  .card{background:white;border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 10px var(--shadow);transition:transform .2s,box-shadow .2s;border-top:4px solid transparent}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 28px var(--shadow)}
  .card.tm-card{border-top-color:#c9a84c}
  .card.biz-pest{border-top-color:#1a6a4a}.card.biz-3c{border-top-color:#1a4a8a}.card.biz-swot{border-top-color:#8a1a4a}.card.biz-bmc{border-top-color:#5a3a8f}.card.biz-jtbd{border-top-color:#8a6a1a}.card.biz-price{border-top-color:#1a6a6a}.card.biz-grow{border-top-color:#4a8a1a}.card.biz-task{border-top-color:#8a4a1a}.card.biz-eval{border-top-color:#1a4a8a}.card.biz-report{border-top-color:#6a1a6a}
