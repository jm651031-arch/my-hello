<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 提示詞工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf6ef;--surface:#fff;--ink:#2a1f0e;--gold:#b8860b;
  --gold-light:#d4a01766;--accent:#8b4513;--cream:#faf6ef;--shadow:rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif TC',serif;min-height:100vh;font-size:16px}

/* HEADER */
.header{text-align:center;padding:40px 24px 32px;position:relative;background:var(–ink)}
.header::before{content:’’;position:absolute;top:0;left:0;right:0;height:5px;background:var(–bar,linear-gradient(90deg,#8b4513,#b8860b,#d4a017,#8b4513))}
.h-label{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#9a8060;margin-bottom:10px}
.h-title{font-family:‘Playfair Display’,serif;font-size:clamp(28px,6vw,44px);color:var(–gold);margin-bottom:10px;line-height:1.2}
.h-sub{font-size:15px;color:#7a6848;margin-bottom:6px}
.h-credit{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:3px;color:#5a5040;margin-top:10px;text-transform:uppercase}

/* FILTER */
.filter-wrap{position:sticky;top:0;z-index:50;background:var(–bg);border-bottom:1px solid var(–gold-light);padding:10px 12px 0}
.cat-row{display:grid;gap:6px;padding-bottom:10px}
.cat-row-1{grid-template-columns:repeat(5,1fr)}
.cat-row-2{grid-template-columns:repeat(5,1fr)}
.cat-btn{padding:9px 4px;border:1px solid var(–gold-light);background:transparent;cursor:pointer;font-family:‘Noto Serif TC’,serif;font-size:13px;color:var(–ink);transition:all .2s;text-align:center;border-radius:7px;white-space:nowrap;opacity:0.75}
.cat-btn:hover{opacity:1;border-color:var(–gold)}
.cat-btn.active{background:var(–ink);color:var(–gold);border-color:var(–ink);opacity:1}
.search-wrap{padding:0 12px 10px;background:var(–bg)}
.search-input{width:100%;padding:11px 16px;border:1px solid var(–gold-light);border-radius:8px;background:var(–surface);font-family:‘Noto Serif TC’,serif;font-size:15px;color:var(–ink)}
.search-input:focus{outline:none;border-color:var(–gold)}

/* SECTION LABELS */
.container{max-width:960px;margin:0 auto;padding:28px 16px 60px}
.sec-label{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(–gold);margin:28px 0 14px 2px;opacity:0.8}
.sec-label.news{color:#4a9eff}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-bottom:8px}
.card{background:var(–surface);border:1px solid var(–gold-light);border-radius:12px;padding:22px;transition:all .2s;position:relative}
.card:hover{border-color:var(–gold);box-shadow:0 6px 20px var(–shadow);transform:translateY(-2px)}
.card.news-card{background:#0d1f35;border-color:#1a3a5f}
.card.news-card:hover{border-color:#4a9eff;box-shadow:0 6px 20px rgba(74,158,255,0.2)}
.card.hidden{display:none!important}
.c-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.c-cat{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(–gold);margin-bottom:6px;opacity:0.8}
.c-title{font-size:17px;font-weight:600;margin-bottom:8px;line-height:1.5;color:var(–ink)}
.c-desc{font-size:13px;color:#7a6040;line-height:1.65}
.news-card .c-cat{color:#4a9eff}
.news-card .c-title{color:#ddeeff}
.news-card .c-desc{color:#5a8aaa}
.c-actions{display:flex;gap:8px;margin-top:16px}
.btn-copy,.btn-expand{padding:10px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s;font-family:‘Noto Serif TC’,serif;font-weight:600}
.btn-copy{background:var(–ink);color:var(–gold);border:none;flex:1}
.btn-copy:hover{opacity:0.85}
.btn-copy.copied{background:#4a6741;color:#fff}
.btn-expand{background:transparent;color:var(–ink);border:1px solid var(–gold-light)}
.btn-expand:hover{border-color:var(–gold)}
.news-card .btn-copy{background:#1a5f8a;color:#ddeeff}
.news-card .btn-expand{color:#7aabcc;border-color:#1a3a5f}
.news-card .btn-expand:hover{border-color:#4a9eff;color:#ddeeff}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(–surface);border-radius:14px;max-width:700px;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.modal.nm{background:#0d1f35;border:1px solid #1a3a5f}
.m-head{padding:22px 26px 16px;border-bottom:1px solid var(–gold-light);display:flex;gap:14px;align-items:flex-start}
.nm .m-head{border-bottom-color:#1a3a5f}
.m-num{font-family:‘Playfair Display’,serif;font-size:30px;color:var(–gold-light);line-height:1;flex-shrink:0}
.m-tag{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:2px;padding:3px 11px;border-radius:12px;display:inline-block;margin-bottom:5px}
.tt{background:#f5ead0;color:#8b3a2a}
.tb{background:#ddeeff;color:#1e3a5f}
.tn{background:#0a2a4a;color:#4a9eff;border:1px solid #1a3a5f}
.m-title{font-size:20px;font-weight:600;color:var(–ink);line-height:1.4}
.nm .m-title{color:#ddeeff}
.m-body{padding:20px 26px;overflow-y:auto;flex:1}
.m-text{width:100%;min-height:220px;padding:16px;border:1px solid var(–gold-light);border-radius:10px;font-family:‘Noto Serif TC’,serif;font-size:15px;line-height:1.9;resize:vertical;color:var(–ink);background:var(–surface)}
.nm .m-text{background:#0a1a2e;border-color:#1a3a5f;color:#ddeeff}
.m-foot{padding:16px 26px;border-top:1px solid var(–gold-light);display:flex;gap:10px}
.nm .m-foot{border-top-color:#1a3a5f}
.m-copy{flex:1;padding:13px;background:var(–ink);color:var(–gold);border:none;border-radius:8px;font-size:15px;cursor:pointer;font-family:‘Noto Serif TC’,serif;font-weight:600;transition:all .2s}
.m-copy:hover{opacity:0.85}
.m-copy.copied{background:#4a6741;color:#fff}
.nm .m-copy{background:#1a5f8a;color:#ddeeff}
.m-close{padding:13px 20px;background:transparent;color:#7a6040;border:1px solid var(–gold-light);border-radius:8px;font-size:15px;cursor:pointer;font-family:‘Noto Serif TC’,serif}
.nm .m-close{color:#5a8aaa;border-color:#1a3a5f}

/* THEME BADGE */
.tbadge{position:fixed;bottom:16px;left:16px;z-index:999;background:rgba(0,0,0,0.55);color:#fff;font-family:‘DM Mono’,monospace;font-size:11px;padding:5px 14px;border-radius:20px;backdrop-filter:blur(6px);letter-spacing:1px;pointer-events:none;opacity:0;transition:opacity 0.5s}
.tbadge.show{opacity:1}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(–ink);color:var(–gold);padding:11px 22px;border-radius:8px;font-size:14px;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999;font-family:‘Noto Serif TC’,serif}
#toast.show{opacity:1;transform:translateY(0)}
</style>

</head>

// ── RENDER ──
P.forEach(p => {
  const g = document.getElementById(p.g);
  if (!g) return;
  const c = document.createElement('div');
  c.className = 'card' + (p.news ? ' news-card' : '');
  c.dataset.cat = p.cat;
  c.dataset.id = p.id;
  c.innerHTML =
    '<div class="c-icon" style="background:' + p.bg + '">' + p.icon + '</div>' +
    '<div class="c-cat">' + p.cat2 + '</div>' +
    '<div class="c-title">' + p.title + '</div>' +
    '<div class="c-desc">' + p.desc + '</div>' +
    '<div class="c-actions">' +
      '<button class="btn-copy" onclick="quickCopy(event,' + p.id + ')">&#8853; 複製</button>' +
      '<button class="btn-expand" onclick="openModal(' + p.id + ')">展開</button>' +
    '</div>';
  g.appendChild(c);
});

// ── FUNCTIONS ──
function quickCopy(e, id) {
  e.stopPropagation();
  const btn = e.currentTarget;
  navigator.clipboard.writeText(P[id].text).then(() => {
    btn.textContent = '✓ 已複製'; btn.classList.add('copied');
    showToast();
    setTimeout(() => { btn.innerHTML = '&#8853; 複製'; btn.classList.remove('copied'); }, 2000);
  });
}

function openModal(id) {
  const p = P[id];
  document.getElementById('mNum').textContent = p.num;
  const tag = document.getElementById('mTag');
  tag.textContent = p.cat2; tag.className = 'm-tag ' + p.cl;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mText').value = p.text;
  document.getElementById('modalBox').className = 'modal' + (p.news ? ' nm' : '');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function copyModal() {
  const btn = document.getElementById('mCopyBtn');
  navigator.clipboard.writeText(document.getElementById('mText').value).then(() => {
    btn.textContent = '✓ 已複製'; btn.classList.add('copied');
    showToast();
    setTimeout(() => { btn.innerHTML = '&#8853; 複製全部'; btn.classList.remove('copied'); }, 2000);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', cat !== 'all' && c.dataset.cat !== cat);
  });
}

function filterCards(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    const p = P[parseInt(c.dataset.id)];
    const txt = (p.title + p.desc + p.cat2 + p.text).toLowerCase();
    c.classList.toggle('hidden', q.length > 0 && !txt.includes(q));
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function applyTheme(t) {
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bg);
  r.setProperty('--cream', t.bg);
  r.setProperty('--ink', t.ink);
  r.setProperty('--gold', t.gold);
  r.setProperty('--gold-light', t.gold + '55');
  r.setProperty('--surface', t.bg === '#080600' || t.bg === '#06101e' ? '#120e04' : '#ffffff');
  r.setProperty('--bar', t.bar);
  document.getElementById('mainHeader').style.background = t.ink;
  document.getElementById('mainHeader').style.setProperty('--bar', t.bar);
  document.getElementById('filterWrap').style.background = t.bg;
  document.getElementById('searchWrap').style.background = t.bg;
  // update card backgrounds for non-news
  document.querySelectorAll('.card:not(.news-card)').forEach(c => {
    c.style.background = t.bg === '#080600' || t.bg === '#06101e' ? '#120e04' : '#ffffff';
  });
  const badge = document.getElementById('tbadge');
  badge.textContent = '🎨 ' + t.name;
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 3000);
}

const theme = THEMES[Math.floor(Math.random() * THEMES.length)];
